<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 برة السالفة</title>
<style>
body{
    font-family:Tahoma,Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}
h1,h2{
    text-align:center;
}
label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}
input,textarea,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:12px;
    box-sizing:border-box;
    font-size:18px;
    border-radius:10px;
}
input,textarea{
    border:1px solid #ccc;
}
button{
    border:none;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#1d4ed8;
}
.hidden{
    display:none;
}
.card{
    background:#f8fafc;
    border-radius:15px;
    padding:30px;
    text-align:center;
    margin-top:20px;
    min-height:120px;
}
.topic{
    color:green;
    font-size:32px;
    font-weight:bold;
}
.outsider{
    color:red;
    font-size:32px;
    font-weight:bold;
}
.player{
    font-size:24px;
    font-weight:bold;
}
.info{
    background:#eef2ff;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>
<body>
<div class="container">
<!-- الإعدادات -->
<div id="setup">
<h1>🎭 لعبة برة السالفة</h1>
<label>عدد اللاعبين</label>
<input id="count" type="number" min="3">
<label>أسماء اللاعبين (اسم في كل سطر)</label>
<textarea id="names" rows="8"></textarea>
<label>عدد برة السالفة</label>
<input id="outsiderCount" type="number" min="1" value="1">
<label>الموضوع</label>
<input id="topic" type="text" placeholder="مثال: كرة القدم">
<button onclick="startGame()">
ابدأ اللعبة
</button>
</div>
<!-- شاشة اللعبة -->
<div id="game" class="hidden">
<div class="info">
مرر الهاتف للاعب التالي
</div>
<h2 id="playerName"></h2>
<div class="card">
<div id="result">
اضغط على عرض
</div>
</div>
<button onclick="showRole()">
عرض
</button>
<button onclick="nextPlayer()">
التالي
</button>
</div>
</div>
<script>
let players = [];
let outsiders = [];
let current = 0;
let topic = "";
function startGame(){
players =
document.getElementById("names")
.value
.split("\n")
.map(x => x.trim())
.filter(x => x !== "");
let count =
parseInt(document.getElementById("count").value);
let outsiderCount =
parseInt(document.getElementById("outsiderCount").value);
topic =
document.getElementById("topic").value.trim();
if(players.length !== count){
alert(
"عدد الأسماء (" +
players.length +
") لا يساوي عدد اللاعبين (" +
count +
")"
);
return;
}
if(topic === ""){
alert("الرجاء إدخال الموضوع");
return;
}
if(outsiderCount >= count){
alert("عدد برة السالفة يجب أن يكون أقل من عدد اللاعبين");
return;
}
outsiders = [];
while(outsiders.length < outsiderCount){
let r =
Math.floor(Math.random() * count);
if(!outsiders.includes(r)){
outsiders.push(r);
}
}
current = 0;
document
.getElementById("setup")
.classList.add("hidden");
document
.getElementById("game")
.classList.remove("hidden");
updatePlayer();
}
function updatePlayer(){
document
.getElementById("playerName")
.innerHTML =
'<span class="player">' +
players[current] +
'</span>';
document
.getElementById("result")
.innerHTML =
"اضغط على عرض";
}
function showRole(){
if(outsiders.includes(current)){
document
.getElementById("result")
.innerHTML =
'<div class="outsider">🚨 أنت برة السالفة</div>';
}else{
document
.getElementById("result")
.innerHTML =
'<div class="topic">' +
topic +
'</div>';
}
}
function nextPlayer(){
current++;
if(current >= players.length){
alert("🎉 انتهت الجولة");
/* العودة للواجهة الرئيسية */
document
.getElementById("game")
.classList.add("hidden");
document
.getElementById("setup")
.classList.remove("hidden");
/* الاحتفاظ بالأسماء */
document
.getElementById("names")
.value =
players.join("\n");
/* الاحتفاظ بعدد اللاعبين */
document
.getElementById("count")
.value =
players.length;
/* الاحتفاظ بعدد برة السالفة */
document
.getElementById("outsiderCount")
.value =
outsiders.length;
/* مسح الموضوع فقط */
document
.getElementById("topic")
.value = "";
/* إعادة التهيئة */
current = 0;
outsiders = [];
topic = "";
return;
}
updatePlayer();
}
</script>
</body>
</html>
